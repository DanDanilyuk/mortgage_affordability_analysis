name: Weekly Case-Shiller Update

on:
  schedule:
    - cron: '5 17 * * 4'
  workflow_dispatch:

permissions:
  contents: write # Required to commit and push changes

concurrency:
  group: weekly-case-shiller
  cancel-in-progress: false

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Skip if already generated today
        id: skip_check
        env:
          TZ: 'America/New_York'
        run: |
          if [ -f weekly_case_shiller_output.json ]; then
            generated_at=$(jq -r '.metadata.generated_at // ""' weekly_case_shiller_output.json)
            today=$(date +%Y-%m-%d)
            if [[ "$generated_at" == "${today}"* ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "⏭️ Already generated today ($generated_at) - skipping"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "✅ Not yet generated today - proceeding"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "✅ No existing output - proceeding"
          fi

      - name: Set up Ruby
        if: steps.skip_check.outputs.skip != 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.4'
          bundler-cache: true

      - name: Run weekly Case-Shiller script (national + all states)
        if: steps.skip_check.outputs.skip != 'true'
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TZ: 'America/New_York'
        run: |
          ruby weekly_case_shiller.rb --bls-api-key $BLS_API_KEY --fred-api-key $FRED_API_KEY

      - name: Validate generated data
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          if [ ! -f weekly_case_shiller_output.json ]; then
            echo "ERROR: Missing national output file"
            exit 1
          fi
          if [ ! -f data/CA.json ]; then
            echo "ERROR: Missing state data files"
            exit 1
          fi
          echo "Data generation validated successfully"

      - name: Check freshness of generated JSON files
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          threshold=$(( $(date +%s) - 8 * 86400 ))
          stale=0
          for f in weekly_case_shiller_output.json data/*.json; do
            ts=$(jq -r '.metadata.generated_at // ""' "$f" 2>/dev/null)
            if [ -z "$ts" ]; then
              echo "ERROR: No generated_at in $f"
              stale=1
              continue
            fi
            file_epoch=$(date -d "$ts" +%s)
            if [ "$file_epoch" -lt "$threshold" ]; then
              echo "ERROR: Stale data in $f (generated_at: $ts)"
              stale=1
            fi
          done
          [ "$stale" -eq 0 ] && echo "✅ All JSON files are fresh (within 8 days)" || exit 1

      - name: Commit and push updated JSON
        if: steps.skip_check.outputs.skip != 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update Case-Shiller data for week of ${{ github.run_id }}'
          file_pattern: '*.json data/*.json'
