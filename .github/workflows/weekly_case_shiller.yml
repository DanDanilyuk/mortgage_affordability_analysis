name: Weekly Case-Shiller Update

on:
  schedule:
    - cron: '5 17 * * 4'
  workflow_dispatch:

permissions:
  contents: write # Required to commit and push changes

concurrency:
  group: weekly-case-shiller
  cancel-in-progress: false

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Skip if already generated within last 6 hours
        id: skip_check
        run: |
          if [ -f weekly_case_shiller_output.json ]; then
            generated_at=$(python3 -c "import json,sys; d=json.load(open('weekly_case_shiller_output.json')); print(d.get('metadata',{}).get('generated_at',''))" 2>/dev/null || echo "")
            if [ -n "$generated_at" ]; then
              gen_epoch=$(date -d "$generated_at" +%s 2>/dev/null || echo 0)
              now_epoch=$(date +%s)
              age=$(( now_epoch - gen_epoch ))
              if [ "$age" -lt 21600 ]; then
                echo "skip=true" >> "$GITHUB_OUTPUT"
                echo "⏭️ Already generated ${age}s ago ($generated_at) - skipping"
              else
                echo "skip=false" >> "$GITHUB_OUTPUT"
                echo "✅ Last run was ${age}s ago - proceeding"
              fi
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "✅ No generated_at found - proceeding"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "✅ No existing output - proceeding"
          fi

      - name: Set up Ruby
        if: steps.skip_check.outputs.skip != 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.4'
          bundler-cache: true

      - name: Run weekly Case-Shiller script (national + all states)
        if: steps.skip_check.outputs.skip != 'true'
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TZ: 'America/New_York'
        run: |
          ruby weekly_case_shiller.rb --bls-api-key $BLS_API_KEY --fred-api-key $FRED_API_KEY

      - name: Validate generated data
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          if [ ! -f weekly_case_shiller_output.json ]; then
            echo "ERROR: Missing national output file"
            exit 1
          fi
          if [ ! -f data/CA.json ]; then
            echo "ERROR: Missing state data files"
            exit 1
          fi
          echo "Data generation validated successfully"

      - name: Check freshness of generated JSON files
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          ruby -rjson -rtime -e '
            threshold = Time.now - 8 * 86400
            stale = []
            Dir.glob(["weekly_case_shiller_output.json", "data/*.json"]).each do |f|
              d = JSON.parse(File.read(f))
              ts = d.dig("metadata", "generated_at")
              if ts.nil? || ts.empty?
                stale << "#{f}: missing generated_at"
              elsif Time.parse(ts) < threshold
                stale << "#{f}: stale (generated_at: #{ts})"
              end
            end
            if stale.any?
              stale.each { |msg| puts "ERROR: #{msg}" }
              exit 1
            end
            puts "✅ All JSON files are fresh (within 8 days)"
          '

      - name: Commit and push updated JSON
        if: steps.skip_check.outputs.skip != 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update Case-Shiller data for week of ${{ github.run_id }}'
          file_pattern: '*.json data/*.json'
